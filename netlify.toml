# ─── Build settings ──────────────────────────────────────────────────────────
[build]
  command   = "npm run build"
  publish   = "dist/guillermo-portfolio/browser"

[build.environment]
  NODE_VERSION = "20"

# ─── SPA redirects — necesario para que /admin y /admin/login no den 404 ─────
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# ─── Headers de seguridad ────────────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-XSS-Protection       = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
